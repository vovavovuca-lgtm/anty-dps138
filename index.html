<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
        canvas { display: block; background: #222; }
        
        /* Стили для кнопок управления */
        .controls {
            position: fixed; bottom: 20px; width: 100%;
            display: flex; justify-content: space-between; padding: 0 20px;
            box-sizing: border-box; pointer-events: none;
        }
        .btn {
            width: 60px; height: 60px; background: rgba(255,255,255,0.2);
            border-radius: 50%; display: flex; align-items: center;
            justify-content: center; color: white; font-weight: bold;
            pointer-events: auto; user-select: none; -webkit-tap-highlight-color: transparent;
        }
        .btn:active { background: rgba(255,255,255,0.5); }
        .left-side { display: flex; gap: 10px; }
        .right-side { display: flex; gap: 10px; }
    </style>
</head>
<body>

<canvas id="game"></canvas>

<div class="controls">
    <div class="left-side">
        <div class="btn" id="btnLeft">←</div>
        <div class="btn" id="btnRight">→</div>
    </div>
    <div class="right-side">
        <div class="btn" id="btnJump" style="background: rgba(0,255,0,0.3)">UP</div>
        <div class="btn" id="btnAttack" style="background: rgba(255,0,0,0.3)">HIT</div>
    </div>
</div>

<script>
const canvas = document.getElementById('game');
const c = canvas.getContext('2d');

canvas.width = window.innerWidth;
canvas.height = window.innerHeight * 0.6; // Оставляем место под кнопки

const gravity = 0.6;
let keys = { left: false, right: false };

class Fighter {
    constructor({ position, color, offset }) {
        this.position = position;
        this.velocity = { x: 0, y: 0 };
        this.width = 40;
        this.height = 100;
        this.color = color;
        this.health = 100;
        this.isAttacking = false;
        this.attackBox = { position: { x: 0, y: 0 }, width: 80, height: 40, offset };
    }

    draw() {
        c.fillStyle = this.color;
        c.fillRect(this.position.x, this.position.y, this.width, this.height);
        
        // Полоска HP
        c.fillStyle = 'white';
        c.fillRect(this.position.x, this.position.y - 15, this.width, 5);
        c.fillStyle = 'red';
        c.fillRect(this.position.x, this.position.y - 15, (this.health/100)*this.width, 5);

        if (this.isAttacking) {
            c.fillStyle = 'yellow';
            c.fillRect(this.attackBox.position.x, this.attackBox.position.y, this.attackBox.width, this.attackBox.height);
        }
    }

    update() {
        this.draw();
        this.attackBox.position.x = this.position.x + this.attackBox.offset.x;
        this.attackBox.position.y = this.position.y + 20;

        this.position.x += this.velocity.x;
        this.position.y += this.velocity.y;

        if (this.position.y + this.height + this.velocity.y >= canvas.height) {
            this.velocity.y = 0;
        } else this.velocity.y += gravity;
    }

    attack() {
        this.isAttacking = true;
        setTimeout(() => this.isAttacking = false, 150);
    }
}

const player = new Fighter({
    position: { x: 50, y: 0 },
    color: '#00ccff',
    offset: { x: 0, y: 0 }
});

const bot = new Fighter({
    position: { x: canvas.width - 100, y: 0 },
    color: '#ff4444',
    offset: { x: -40, y: 0 }
});

// Обработка нажатий на кнопки
const setupBtn = (id, key) => {
    const el = document.getElementById(id);
    el.addEventListener('touchstart', (e) => { e.preventDefault(); if(key === 'jump') { if(player.velocity.y === 0) player.velocity.y = -15; } else if(key === 'attack') { player.attack(); } else { keys[key] = true; } });
    el.addEventListener('touchend', (e) => { e.preventDefault(); if(key !== 'jump' && key !== 'attack') keys[key] = false; });
};

setupBtn('btnLeft', 'left');
setupBtn('btnRight', 'right');
setupBtn('btnJump', 'jump');
setupBtn('btnAttack', 'attack');

function animate() {
    requestAnimationFrame(animate);
    c.clearRect(0, 0, canvas.width, canvas.height);
    
    player.update();
    bot.update();

    player.velocity.x = 0;
    if (keys.left) player.velocity.x = -5;
    if (keys.right) player.velocity.x = 5;

    // Простая логика для Ботa (двигается к игроку)
    if (bot.position.x > player.position.x + 50) bot.velocity.x = -2;
    else if (bot.position.x < player.position.x - 50) bot.velocity.x = 2;
    else {
        bot.velocity.x = 0;
        if (Math.random() < 0.02) bot.attack();
    }

    // Коллизии
    if (player.isAttacking && player.attackBox.position.x < bot.position.x + bot.width && player.attackBox.position.x + player.attackBox.width > bot.position.x && player.attackBox.position.y < bot.position.y + bot.height) {
        bot.health -= 1;
        player.isAttacking = false;
    }
}

animate();
</script>
</body>
</html>
