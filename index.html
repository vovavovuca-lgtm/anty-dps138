<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Локатор Братск</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background: #f0f0f0; font-family: sans-serif; }
        #map { height: 100vh; width: 100vw; z-index: 1; }
        
        /* Кнопка GPS */
        .add-btn {
            position: absolute; bottom: 30px; left: 50%;
            transform: translateX(-50%); z-index: 1000;
            background: #0088cc; color: white; padding: 15px 25px;
            border-radius: 50px; border: none; font-weight: bold;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            cursor: pointer;
        }
        
        /* Картинка внутри метки */
        .popup-img {
            width: 100%;
            max-width: 200px;
            border-radius: 8px;
            margin-top: 8px;
            display: block;
        }
        
        .leaflet-popup-content { min-width: 150px; }
    </style>
</head>
<body>

    <div id="map"></div>
    <button class="add-btn" onclick="getLocation()">📍 ГДЕ Я?</button>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <script>
        // --- 1. ТВОИ ДАННЫЕ (ЗАМЕНИ ИХ) ---
        const SUPABASE_URL = 'https://ucyhfxapegpoubixlayp.supabase.co'; 
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVjeWhmeGFwZWdwb3ViaXhsYXlwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwMDMxMjAsImV4cCI6MjA4OTU3OTEyMH0.HkJ5Y0SPBjiCcg8eErtCWhHYIwlA4HV9TrfTRxpHIh0'; 

        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // --- 2. НАСТРОЙКА КАРТЫ ---
        // Центрируем на Братск (примерные координаты)
        var map = L.map('map', { zoomControl: false }).setView([56.13, 101.60], 12);
        
        // Стандартный слой карт (OpenStreetMap) - работает всегда
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19
        }).addTo(map);

        // --- 3. ЗАГРУЗКА МЕТОК ---
        async function loadMarkers() {
            try {
                const { data, error } = await supabaseClient.from('markers').select('*');
                if (error) throw error;
                
                if (data) {
                    data.forEach(m => {
                        let content = `<b>${m.content}</b>`;
                        if (m.image_url) {
                            content += `<br><img src="${m.image_url}" class="popup-img">`;
                        }
                        L.marker([m.lat, m.lng]).addTo(map).bindPopup(content);
                    });
                }
            } catch (err) {
                console.error("Ошибка загрузки:", err.message);
            }
        }
        loadMarkers();

        // --- 4. ДОБАВЛЕНИЕ НОВОЙ МЕТКИ С ФОТО ---
        map.on('click', async function(e) {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = 'image/*'; // Открывает камеру на телефоне
            
            input.onchange = async () => {
                const file = input.files[0];
                if (!file) return;

                const text = prompt("Что тут? (Например: Экипаж ДПС, ДТП, Ремонт)");
                if (!text) return;

                // Показываем индикатор загрузки (простой алерт)
                console.log("Загрузка...");

                try {
                    // А) Загружаем фото в Storage
                    const fileName = `img_${Date.now()}.jpg`;
                    const { data: uploadData, error: uploadError } = await supabaseClient.storage
                        .from('images')
                        .upload(fileName, file);

                    if (uploadError) throw uploadError;

                    // Б) Получаем ссылку
                    const imgUrl = `${SUPABASE_URL}/storage/v1/object/public/images/${fileName}`;

                    // В) Записываем в таблицу markers
                    const { error: dbError } = await supabaseClient.from('markers').insert([{
                        lat: e.latlng.lat,
                        lng: e.latlng.lng,
                        content: text,
                        image_url: imgUrl
                    }]);

                    if (dbError) throw dbError;

                    // Г) Ставим метку на карту сразу
                    L.marker(e.latlng).addTo(map).bindPopup(`<b>${text}</b><br><img src="${imgUrl}" class="popup-img">`).openPopup();

                } catch (err) {
                    alert("Ошибка: " + err.message);
                }
            };
            input.click();
        });

        // --- 5. ГЕОЛОКАЦИЯ ---
        function getLocation() {
            map.locate({setView: true, maxZoom: 16});
        }

        map.on('locationfound', function(e) {
            L.circle(e.latlng, {radius: 20, color: '#0088cc'}).addTo(map).bindPopup("Ты здесь").openPopup();
        });

        map.on('locationerror', function() {
            alert("Включи GPS на телефоне");
        });
    </script>
</body>
</html>
