<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Братск Локатор v5</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        :root {
            --accent: #007aff;
            --bg: #1c1c1e;
            --panel: rgba(28, 28, 30, 0.9);
            --text: #ffffff;
            --glass: saturate(180%) blur(20px);
        }

        body, html { margin: 0; padding: 0; height: 100%; background: #000; font-family: -apple-system, system-ui, sans-serif; overflow: hidden; }
        #map { height: 100vh; width: 100vw; z-index: 1; }

        /* Верхняя панель */
        .top-bar {
            position: absolute; top: 15px; left: 15px; right: 15px; z-index: 1000;
            display: flex; justify-content: space-between; align-items: center; pointer-events: none;
        }
        .status-badge {
            background: var(--panel); -webkit-backdrop-filter: var(--glass); backdrop-filter: var(--glass);
            padding: 8px 16px; border-radius: 20px; color: #32d74b; font-size: 12px; font-weight: 600;
            border: 1px solid rgba(255,255,255,0.1); pointer-events: auto;
        }

        /* Кнопки управления внизу */
        .bottom-nav {
            position: absolute; bottom: 30px; left: 15px; right: 15px; z-index: 1000;
            display: flex; gap: 10px;
        }
        .nav-btn {
            flex: 1; background: var(--panel); -webkit-backdrop-filter: var(--glass); backdrop-filter: var(--glass);
            border: 1px solid rgba(255,255,255,0.1); color: white; padding: 18px; border-radius: 18px;
            font-weight: 700; font-size: 13px; text-transform: uppercase; transition: 0.2s;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }
        .nav-btn:active { transform: scale(0.96); background: #2c2c2e; }
        .btn-main { background: var(--accent); border: none; }

        /* Панель Чата */
        #chat-panel {
            position: fixed; top: 0; right: -100%; width: 100%; height: 100%;
            background: var(--bg); z-index: 2000; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex; flex-direction: column;
        }
        #chat-panel.active { right: 0; }
        
        .chat-header { padding: 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; }
        .close-chat { background: #333; color: white; border: none; padding: 10px 20px; border-radius: 12px; font-weight: bold; }
        
        #chat-msgs { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; color: #ccc; font-size: 14px; }
        .chat-input-area { padding: 20px; background: #121212; display: flex; gap: 10px; padding-bottom: 40px; }
        #chat-input { flex: 1; background: #2c2c2e; border: none; padding: 15px; border-radius: 12px; color: white; outline: none; }
        .send-btn { background: var(--accent); border: none; color: white; padding: 0 20px; border-radius: 12px; font-weight: bold; }

        /* Попапы на карте */
        .leaflet-popup-content-wrapper { background: #1c1c1e; color: white; border-radius: 15px; }
        .popup-container { min-width: 200px; display: flex; flex-direction: column; gap: 8px; }
        .popup-input { background: #2c2c2e; border: 1px solid #444; padding: 10px; border-radius: 8px; color: white; }
        .pop-btn { background: var(--accent); color: white; border: none; padding: 12px; border-radius: 8px; font-weight: bold; }
        .pop-img-btn { background: #3a3a3c; color: white; border: none; padding: 8px; border-radius: 8px; font-size: 12px; }
        .map-img { width: 100%; border-radius: 10px; margin-top: 5px; border: 1px solid #333; }
    </style>
</head>
<body>

    <div id="map"></div>

    <div class="top-bar">
        <div class="status-badge">● БРАТСК LIVE: <span id="online-count">1</span></div>
    </div>

    <div class="bottom-nav">
        <button class="nav-btn" onclick="openChat()">💬 ЧАТ</button>
        <button class="nav-btn" onclick="getLocation()">📍 ГДЕ Я?</button>
        <button class="nav-btn btn-main" onclick="addAtUserCoords()">🚔 МЕТКА</button>
    </div>

    <div id="chat-panel">
        <div class="chat-header">
            <h2 style="margin:0">Чат событий</h2>
            <button class="close-chat" onclick="closeChat()">ЗАКРЫТЬ</button>
        </div>
        <div id="chat-msgs"></div>
        <div class="chat-input-area">
            <input type="text" id="chat-input" placeholder="Введите сообщение...">
            <button class="send-btn" onclick="sendMsg()">ОТПР.</button>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <script>
        const SUPABASE_URL = 'https://ucyhfxapegpoubixlayp.supabase.co'; 
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVjeWhmeGFwZWdwb3ViaXhsYXlwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwMDMxMjAsImV4cCI6MjA4OTU3OTEyMH0.HkJ5Y0SPBjiCcg8eErtCWhHYIwlA4HV9TrfTRxpHIh0'; 
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        if (!localStorage.getItem('my_uid')) localStorage.setItem('my_uid', 'u' + Date.now());
        const myUid = localStorage.getItem('my_uid');

        var map = L.map('map', { zoomControl: false }).setView([56.13, 101.60], 12);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        const dpsIcon = L.divIcon({ html: '🚔', className: '', iconSize: [30, 30], iconAnchor: [15, 15] });
        const myCarIcon = L.divIcon({ html: '🚙', className: '', iconSize: [36, 36], iconAnchor: [18, 18] });

        var userMarker, userCoords;
        var markersLayer = L.layerGroup().addTo(map);

        // --- ЛОГИКА ЧАТА ---
        function openChat() { document.getElementById('chat-panel').classList.add('active'); }
        function closeChat() { document.getElementById('chat-panel').classList.remove('active'); }

        function appendMsg(txt) {
            const box = document.getElementById('chat-msgs');
            box.innerHTML += `<div><b style="color:var(--accent)">Водитель:</b> ${txt}</div>`;
            box.scrollTop = box.scrollHeight;
        }

        async function sendMsg() {
            const input = document.getElementById('chat-input');
            const val = input.value;
            if (!val) return;

            if (val === 'Cleanchat') await supabase.from('messages').delete().neq('id', 0);
            else if (val === 'Cleanmarker') await supabase.from('markers').delete().neq('id', 0);
            else await supabase.from('messages').insert([{ text: val }]);
            
            input.value = '';
        }

        // --- МЕТКИ ---
        function renderMarker(m) {
            let h = `<div class="popup-container"><b style="font-size:16px">${m.content}</b>`;
            if (m.image_url) h += `<img src="${m.image_url}" class="map-img" onclick="window.open('${m.image_url}')">`;
            if (m.user_id === myUid) h += `<button onclick="deleteMarker(${m.id})" style="background:none; border:none; color:#ff453a; padding:5px; font-size:11px">Удалить мою метку</button>`;
            h += `</div>`;
            L.marker([m.lat, m.lng], {icon: dpsIcon}).addTo(markersLayer).bindPopup(h);
        }

        function createAddForm(latlng) {
            const div = document.createElement('div');
            div.className = 'popup-container';
            div.innerHTML = `
                <input type="text" id="p-txt" class="popup-input" placeholder="Что видим?">
                <img id="p-pre" style="display:none; width:100%; border-radius:8px">
                <button id="p-cam" class="pop-img-btn">📷 Сделать фото</button>
                <button id="p-ok" class="pop-btn">ОПУБЛИКОВАТЬ</button>
            `;

            let imgUrl = null;
            div.querySelector('#p-cam').onclick = () => {
                const i = document.createElement('input'); i.type = 'file'; i.accept = 'image/*';
                i.onchange = async () => {
                    if (i.files[0]) {
                        const n = Date.now() + '.jpg';
                        div.querySelector('#p-cam').innerText = "Загрузка...";
                        const { data } = await supabase.storage.from('images').upload(n, i.files[0]);
                        if (data) {
                            imgUrl = `${SUPABASE_URL}/storage/v1/object/public/images/${n}`;
                            div.querySelector('#p-pre').src = imgUrl;
                            div.querySelector('#p-pre').style.display = 'block';
                            div.querySelector('#p-cam').style.display = 'none';
                        }
                    }
                };
                i.click();
            };

            div.querySelector('#p-ok').onclick = async () => {
                const t = div.querySelector('#p-txt').value;
                if (!t) return alert("Введите текст");
                await supabase.from('markers').insert([{ lat: latlng.lat, lng: latlng.lng, content: t, image_url: imgUrl, user_id: myUid }]);
                await supabase.from('messages').insert([{ text: "🚔 Метка: " + t }]);
                map.closePopup();
            };

            L.popup().setLatLng(latlng).setContent(div).openOn(map);
        }

        // --- КНОПКИ И GPS ---
        map.on('click', e => createAddForm(e.latlng));
        function addAtUserCoords() { if (userCoords) createAddForm(userCoords); else alert("Сначала нажми 'ГДЕ Я?'"); }

        function getLocation() { 
            // Это вызовет запрос геолокации ТОЛЬКО по нажатию
            map.locate({setView: true, maxZoom: 15, enableHighAccuracy: true}); 
        }

        map.on('locationfound', e => {
            userCoords = e.latlng;
            if (userMarker) userMarker.setLatLng(e.latlng);
            else userMarker = L.marker(e.latlng, {icon: myCarIcon}).addTo(map);
        });

        window.deleteMarker = async (id) => { await supabase.from('markers').delete().eq('id', id); };

        // --- REALTIME ---
        supabase.channel('room1').on('postgres_changes', { event: '*', schema: 'public', table: 'markers' }, (p) => {
            if (p.eventType === 'INSERT') renderMarker(p.new);
            if (p.eventType === 'DELETE') { markersLayer.clearLayers(); loadInitial(); }
        }).on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, (p) => {
            appendMsg(p.new.text);
        }).subscribe();

        const pres = supabase.channel('online');
        pres.on('presence', { event: 'sync' }, () => {
            document.getElementById('online-count').innerText = Object.keys(pres.presenceState()).length;
        }).subscribe(async (s) => { if (s === 'SUBSCRIBED') await pres.track({ online: true }); });

        async function loadInitial() {
            const { data: mrks } = await supabase.from('markers').select('*');
            if (mrks) mrks.forEach(renderMarker);
            const { data: msgs } = await supabase.from('messages').select('*').order('created_at', {ascending: false}).limit(10);
            if (msgs) msgs.reverse().forEach(m => appendMsg(m.text));
        }
        loadInitial();
    </script>
</body>
</html>
