<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Братск Локатор Исправленный</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background: #1a1a1a; font-family: -apple-system, sans-serif; overflow: hidden; }
        #map { height: 100vh; width: 100vw; background: #222; }

        /* Интерфейс */
        #online-tracker { position: absolute; top: 15px; left: 15px; z-index: 1001; background: rgba(0,0,0,0.8); color: #00ff00; padding: 5px 15px; border-radius: 20px; font-size: 13px; border: 1px solid #00ff00; font-weight: bold; }
        
        #chat-window { position: absolute; top: 15px; right: 15px; width: 260px; z-index: 1001; background: rgba(0,0,0,0.9); border-radius: 12px; display: flex; flex-direction: column; box-shadow: 0 4px 20px rgba(0,0,0,0.5); border: 1px solid #333; transition: height 0.3s; }
        #chat-header { padding: 12px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; color: white; font-weight: bold; }
        #chat-body { height: 200px; display: flex; flex-direction: column; }
        #chat-messages { flex: 1; overflow-y: auto; padding: 10px; color: #eee; font-size: 12px; border-top: 1px solid #333; }
        .minimized #chat-body { display: none; }

        .controls { position: absolute; bottom: 25px; left: 10px; right: 10px; z-index: 1001; display: flex; gap: 10px; }
        .btn { flex: 1; border: none; padding: 15px; border-radius: 12px; font-weight: bold; color: white; cursor: pointer; font-size: 14px; text-transform: uppercase; box-shadow: 0 4px 10px rgba(0,0,0,0.4); }
        .btn-blue { background: #0077ff; }
        .btn-green { background: #28a745; }

        /* Стили для ЕДИНОГО попапа добавления */
        .popup-form { min-width: 200px; padding: 5px; color: #333; }
        .popup-input { width: 100%; margin-bottom: 10px; padding: 8px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
        .photo-preview { width: 100%; border-radius: 8px; display: none; margin-bottom: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        .btn-photo { background: #6c757d; color: white; border: none; padding: 8px; width: 100%; border-radius: 6px; margin-bottom: 8px; cursor: pointer; font-size: 13px; }
        .btn-save { background: #28a745; color: white; border: none; padding: 10px; width: 100%; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 14px; }

        /* Фото на карте */
        .map-img { width: 100%; border-radius: 8px; margin-top: 8px; cursor: zoom-in; max-height: 150px; object-fit: cover; }
        .del-btn { background: #ff4444; color: white; border: none; padding: 5px 10px; border-radius: 5px; margin-top: 10px; width: 100%; cursor: pointer; font-size: 12px; }

        /* Оверлей для большого фото */
        .full-img-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 2000; display: none; justify-content: center; align-items: center; }
        .full-img-overlay img { max-width: 95%; max-height: 95%; border-radius: 10px; }
    </style>
</head>
<body>

    <div id="online-tracker">Онлайн: <span id="online-count">1</span></div>

    <div id="chat-window">
        <div id="chat-header" onclick="toggleChat()">
            <span>💬 ЧАТ СОБЫТИЙ</span>
            <span id="toggle-icon">—</span>
        </div>
        <div id="chat-body">
            <div id="chat-messages"></div>
        </div>
    </div>

    <div id="map"></div>

    <div class="controls">
        <button class="btn btn-blue" onclick="getLocation()">📍 ГДЕ Я?</button>
        <button class="btn btn-green" onclick="addAtUserCoords()">🚔 МЕТКА ТУТ</button>
    </div>

    <div id="img-overlay" class="full-img-overlay" onclick="this.style.display='none'">
        <img id="full-img" src="">
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <script>
        const SUPABASE_URL = 'https://ucyhfxapegpoubixlayp.supabase.co'; 
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVjeWhmeGFwZWdwb3ViaXhsYXlwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwMDMxMjAsImV4cCI6MjA4OTU3OTEyMH0.HkJ5Y0SPBjiCcg8eErtCWhHYIwlA4HV9TrfTRxpHIh0'; 
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        if (!localStorage.getItem('my_uid')) localStorage.setItem('my_uid', 'u' + Date.now() + Math.random().toString(36).substr(2, 5));
        const myUid = localStorage.getItem('my_uid');

        const dpsIcon = L.divIcon({ html: '🚔', className: '', iconSize: [30, 30], iconAnchor: [15, 15] });
        const myCarIcon = L.divIcon({ html: '🚙', className: '', iconSize: [36, 36], iconAnchor: [18, 18] });

        var map = L.map('map', { zoomControl: false }).setView([56.13, 101.60], 12);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        var userMarker, userCoords;
        var markersLayer = L.layerGroup().addTo(map);

        // Интерфейс
        function toggleChat() {
            document.getElementById('chat-window').classList.toggle('minimized');
            document.getElementById('toggle-icon').innerText = document.getElementById('chat-window').classList.contains('minimized') ? '+' : '—';
        }
        function appendMsg(txt) {
            const box = document.getElementById('chat-messages');
            box.innerHTML += `<div><b>Событие:</b> ${txt}</div>`;
            box.scrollTop = box.scrollHeight;
        }

        // Рендер метки
        function renderMarker(m) {
            let html = `<div><b>${m.content}</b>`;
            if (m.image_url) html += `<img src="${m.image_url}" class="map-img" onclick="showFullImg('${m.image_url}')">`;
            if (m.user_id === myUid) html += `<button class="del-btn" onclick="deleteMarker(${m.id})">Удалить</button>`;
            html += `</div>`;
            L.marker([m.lat, m.lng], {icon: dpsIcon}).addTo(markersLayer).bindPopup(html);
        }

        // --- ЛОГИКА ЕДИНОГО ОКНА ДОБАВЛЕНИЯ ---
        function createAddFormPopup(latlng) {
            const container = document.createElement('div');
            container.className = 'popup-form';
            container.innerHTML = `
                <input type="text" id="pop-text" class="popup-input" placeholder="Что тут происходит?">
                <img id="pop-preview" class="photo-preview">
                <button id="pop-photo-btn" class="btn-photo">📷 Добавить фото</button>
                <button id="pop-save-btn" class="btn-save">СОХРАНИТЬ</button>
            `;

            let currentImageUrl = null;

            // Логика кнопки фото
            container.querySelector('#pop-photo-btn').onclick = () => {
                const input = document.createElement('input');
                input.type = 'file'; input.accept = 'image/*';
                input.onchange = async () => {
                    const file = input.files[0];
                    if (file) {
                        const fname = 'img_' + Date.now() + '.jpg';
                        container.querySelector('#pop-photo-btn').innerText = "Загрузка...";
                        const { data } = await supabaseClient.storage.from('images').upload(fname, file);
                        if (data) {
                            currentImageUrl = `${SUPABASE_URL}/storage/v1/object/public/images/${fname}`;
                            container.querySelector('#pop-preview').src = currentImageUrl;
                            container.querySelector('#pop-preview').style.display = 'block';
                            container.querySelector('#pop-photo-btn').style.display = 'none';
                        }
                    }
                };
                input.click();
            };

            // Логика кнопки Сохранить
            container.querySelector('#pop-save-btn').onclick = async () => {
                const text = container.querySelector('#pop-text').value;
                if (!text) return alert("Введите текст!");
                container.querySelector('#pop-save-btn').innerText = "Сохранение...";
                
                await supabaseClient.from('markers').insert([{
                    lat: latlng.lat, lng: latlng.lng, content: text, image_url: currentImageUrl, user_id: myUid
                }]);
                await supabaseClient.from('messages').insert([{ text: "🚔 " + text }]);
                map.closePopup();
            };

            L.popup().setLatLng(latlng).setContent(container).openOn(map);
        }

        // --- ОБРАБОТЧИКИ НАЖАТИЙ ---
        
        // Клик по карте (Исправленный!)
        map.on('click', function(e) {
            createAddFormPopup(e.latlng);
        });

        // Кнопка "Метка тут" (по GPS)
        function addAtUserCoords() {
            if (!userCoords) return alert("Сначала нажми 'ГДЕ Я?', чтобы поймать GPS");
            createAddFormPopup(userCoords);
        }

        // Вспомогательные функции
        window.showFullImg = (url) => {
            document.getElementById('full-img').src = url;
            document.getElementById('img-overlay').style.display = 'flex';
        };
        window.deleteMarker = async (id) => {
            await supabaseClient.from('markers').delete().eq('id', id);
        };

        // --- GPS ---
        function getLocation() { map.locate({setView: true, maxZoom: 15, enableHighAccuracy: true}); }
        map.on('locationfound', e => {
            userCoords = e.latlng;
            if (userMarker) userMarker.setLatLng(e.latlng);
            else userMarker = L.marker(e.latlng, {icon: myCarIcon}).addTo(map).bindPopup("Я тут 🚙");
        });

        // --- REALTIME ---
        supabaseClient.channel('db').on('postgres_changes', { event: '*', schema: 'public', table: 'markers' }, (p) => {
            if (p.eventType === 'INSERT') renderMarker(p.new);
            if (p.eventType === 'DELETE') { markersLayer.clearLayers(); refreshMarkers(); }
        }).on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, (p) => {
            appendMsg(p.new.text);
        }).subscribe();

        // Онлайн
        const pres = supabaseClient.channel('online');
        pres.on('presence', { event: 'sync' }, () => {
            document.getElementById('online-count').innerText = Object.keys(pres.presenceState()).length;
        }).subscribe(async (s) => { if (s === 'SUBSCRIBED') await pres.track({ online: true }); });

        // Старт
        async function refreshMarkers() {
            const { data: mrks } = await supabaseClient.from('markers').select('*');
            if (mrks) mrks.forEach(renderMarker);
            const { data: msgs } = await supabaseClient.from('messages').select('*').order('created_at', {ascending: false}).limit(10);
            if (msgs) msgs.reverse().forEach(m => appendMsg(m.text));
        }
        refreshMarkers();
    </script>
</body>
</html>
