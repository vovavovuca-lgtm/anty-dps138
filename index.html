<!DOCTYPE html>
<html style="margin:0; padding:0; height:100%; width:100%;">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Братск Локатор v11</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin:0; padding:0; height:100%; width:100%; background:#1a1a1a; font-family: sans-serif; overflow:hidden; }
        #map { width:100%; height:100%; position:absolute; top:0; left:0; z-index:1; background:#1a1a1a; }
        
        /* Кнопки и интерфейс */
        .ui-fixed { position:absolute; z-index:1000; pointer-events:none; width:100%; display:flex; padding:15px; box-sizing:border-box; }
        .bottom-row { bottom:20px; gap:10px; }
        .btn { 
            flex:1; pointer-events:auto; background:#2c2c2e; color:white; border:1px solid #444; 
            padding:15px 5px; border-radius:12px; font-weight:bold; font-size:12px; text-transform:uppercase;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
        }
        .btn-blue { background:#007aff; border:none; }
        
        /* Окно чата */
        #chat-box { 
            position:fixed; bottom:-100%; left:0; width:100%; height:80%; 
            background:#121212; z-index:2000; transition: 0.3s; display:flex; flex-direction:column; 
        }
        #chat-box.open { bottom:0; }
        .chat-h { padding:15px; background:#1c1c1e; display:flex; justify-content:space-between; align-items:center; }
        #chat-msgs { flex:1; overflow-y:auto; padding:15px; color:#ccc; }
        .chat-f { padding:15px; display:flex; gap:10px; background:#1c1c1e; }
        input { flex:1; background:#2c2c2e; border:none; padding:12px; border-radius:10px; color:white; }

        /* Попапы */
        .pop-v { display:flex; flex-direction:column; gap:8px; min-width:150px; color:#000; }
        .pop-img { width:100%; border-radius:8px; margin-top:5px; }
    </style>
</head>
<body style="margin:0; padding:0; height:100%; width:100%;">

    <div id="map"></div>

    <div class="ui-fixed bottom-row">
        <button class="btn" onclick="openChat(true)">ЧАТ</button>
        <button class="btn" onclick="findGPS()">ГДЕ Я?</button>
        <button class="btn btn-blue" onclick="addMarkBtn()">МЕТКА</button>
    </div>

    <div id="chat-box">
        <div class="chat-h">
            <span style="color:white; font-weight:bold">ЧАТ ДОРОГ</span>
            <button class="btn" style="flex:none; padding:8px 15px" onclick="openChat(false)">ЗАКРЫТЬ</button>
        </div>
        <div id="chat-msgs"></div>
        <div class="chat-f">
            <input type="text" id="chat-in" placeholder="Сообщение...">
            <button class="btn-blue" style="width:50px; border-radius:10px; border:none; color:white" onclick="sendMsg()">></button>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <script>
        // 1. НАСТРОЙКИ
        const S_URL = 'https://ucyhfxapegpoubixlayp.supabase.co'; 
        const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVjeWhmeGFwZWdwb3ViaXhsYXlwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwMDMxMjAsImV4cCI6MjA4OTU3OTEyMH0.HkJ5Y0SPBjiCcg8eErtCWhHYIwlA4HV9TrfTRxpHIh0'; 
        const supabase = window.supabase.createClient(S_URL, S_KEY);
        const myUid = localStorage.getItem('v11_id') || 'u' + Date.now();
        localStorage.setItem('v11_id', myUid);

        // 2. КАРТА (С ЖЕСТКИМ ФИКСОМ)
        const map = L.map('map', { zoomControl:false, attributionControl:false }).setView([56.13, 101.60], 12);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        // ПИНАЕМ КАРТУ, ЧТОБЫ НЕ БЫЛО СЕРОГО ЭКРАНА
        function fixMap() { map.invalidateSize(); }
        window.onload = () => {
            for(let i=0; i<5; i++) { setTimeout(fixMap, i * 500); }
        };

        const marksLayer = L.layerGroup().addTo(map);
        let myLoc = null, myMarker = null;

        // 3. ФУНКЦИИ
        function openChat(s) { document.getElementById('chat-box').classList.toggle('open', s); }
        
        async function sendMsg() {
            const i = document.getElementById('chat-in');
            if(!i.value.trim()) return;
            await supabase.from('messages').insert([{ text: i.value }]);
            i.value = '';
        }

        function draw(m) {
            let h = `<div class="pop-v"><b>${m.content}</b>`;
            if(m.image_url) h += `<img src="${m.image_url}" class="pop-img" onclick="window.open('${m.image_url}')">`;
            if(m.user_id === myUid) h += `<button onclick="del(${m.id})" style="border:none; color:red; background:none; padding:5px">Удалить</button>`;
            h += `</div>`;
            L.marker([m.lat, m.lng], { icon: L.divIcon({html:'🚔', className:'', iconSize:[30,30]}) }).addTo(markersLayer).bindPopup(h);
        }

        function form(ll) {
            const d = document.createElement('div');
            d.className = 'pop-v';
            d.innerHTML = `<input id="f-t" placeholder="Что тут?" style="padding:8px; border:1px solid #ccc; border-radius:5px">
                           <button id="f-c" class="btn" style="padding:8px">ФОТО</button>
                           <button id="f-s" class="btn btn-blue" style="padding:8px">ОК</button>`;
            
            let img = null;
            d.querySelector('#f-c').onclick = () => {
                const f = document.createElement('input'); f.type = 'file'; f.accept = 'image/*';
                f.onchange = async () => {
                    if(!f.files[0]) return;
                    d.querySelector('#f-c').innerText = '...';
                    const name = Date.now() + '.jpg';
                    const { data } = await supabase.storage.from('images').upload(name, f.files[0]);
                    if(data) {
                        img = `${S_URL}/storage/v1/object/public/images/${name}`;
                        d.querySelector('#f-c').innerText = '✅ ФОТО';
                    }
                };
                f.click();
            };

            d.querySelector('#f-s').onclick = async () => {
                const t = d.querySelector('#f-t').value;
                if(!t) return;
                draw({ lat: ll.lat, lng: ll.lng, content: t, image_url: img, user_id: myUid, id: Date.now() });
                map.closePopup();
                await supabase.from('markers').insert([{ lat: ll.lat, lng: ll.lng, content: t, image_url: img, user_id: myUid }]);
            };
            L.popup().setLatLng(ll).setContent(d).openOn(map);
        }

        function findGPS() { map.locate({setView:true, maxZoom:15}); }
        map.on('locationfound', e => {
            myLoc = e.latlng;
            if(myMarker) myMarker.setLatLng(e.latlng);
            else myMarker = L.marker(e.latlng, { icon: L.divIcon({html:'🚙', className:'', iconSize:[36,36]}) }).addTo(map);
        });
        
        function addMarkBtn() { if(myLoc) form(myLoc); else alert('Жми ГДЕ Я?'); }
        map.on('click', e => form(e.latlng));

        window.del = async (id) => {
            await supabase.from('markers').delete().eq('id', id);
            markersLayer.clearLayers();
            load();
        };

        // 4. REALTIME
        async function load() {
            const { data: mrk } = await supabase.from('markers').select('*');
            if(mrk) mrk.forEach(draw);
            const { data: msg } = await supabase.from('messages').select('*').order('created_at',{ascending:false}).limit(10);
            if(msg) msg.reverse().forEach(m => {
                document.getElementById('chat-msgs').innerHTML += `<div><b>Водитель:</b> ${m.text}</div>`;
            });
        }

        supabase.channel('v11').on('postgres_changes', { event:'*', schema:'public', table:'markers' }, (p) => {
            if(p.eventType === 'INSERT' && p.new.user_id !== myUid) draw(p.new);
            if(p.eventType === 'DELETE') { markersLayer.clearLayers(); load(); }
        }).on('postgres_changes', { event:'INSERT', schema:'public', table:'messages' }, (p) => {
            document.getElementById('chat-msgs').innerHTML += `<div><b>Водитель:</b> ${p.new.text}</div>`;
        }).subscribe();

        load();
    </script>
</body>
</html>
