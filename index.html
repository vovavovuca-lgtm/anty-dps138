<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Братск Локатор Pro v8</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        :root {
            --accent: #007aff;
            --bg: #121212;
            --glass: saturate(180%) blur(20px);
        }

        body, html { margin: 0; padding: 0; height: 100%; width: 100%; background: #000; font-family: -apple-system, sans-serif; overflow: hidden; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; background: #1a1a1a; z-index: 1; }

        .top-info {
            position: absolute; top: 15px; left: 15px; z-index: 1000;
            background: rgba(30, 30, 30, 0.7); -webkit-backdrop-filter: var(--glass); backdrop-filter: var(--glass);
            padding: 8px 16px; border-radius: 20px; color: #32d74b; font-size: 12px; font-weight: bold;
            border: 1px solid rgba(255,255,255,0.1); pointer-events: none;
        }

        .nav-bar {
            position: absolute; bottom: 30px; left: 15px; right: 15px; z-index: 1000;
            display: flex; gap: 10px;
        }
        .btn {
            flex: 1; background: rgba(30, 30, 30, 0.7); -webkit-backdrop-filter: var(--glass); backdrop-filter: var(--glass);
            border: 1px solid rgba(255,255,255,0.1); color: white; padding: 18px 5px; border-radius: 20px;
            font-weight: bold; font-size: 12px; text-transform: uppercase; box-shadow: 0 8px 20px rgba(0,0,0,0.5);
        }
        .btn-main { background: var(--accent); border: none; }

        /* Чат */
        #chat-ui {
            position: fixed; top: 0; right: -100%; width: 100%; height: 100%;
            background: var(--bg); z-index: 2000; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex; flex-direction: column;
        }
        #chat-ui.active { right: 0; }
        .chat-head { padding: 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; }
        .chat-list { flex: 1; overflow-y: auto; padding: 15px; color: #eee; font-size: 14px; }
        .chat-input-row { padding: 15px; background: #1a1a1a; display: flex; gap: 10px; padding-bottom: 35px; }
        #chat-input { flex: 1; background: #333; border: none; padding: 12px; border-radius: 12px; color: white; outline: none; }

        /* Попапы */
        .leaflet-popup-content-wrapper { background: #1c1c1e; color: white; border-radius: 18px; padding: 5px; }
        .leaflet-popup-tip { background: #1c1c1e; }
        .pop-box { min-width: 180px; display: flex; flex-direction: column; gap: 10px; padding: 5px; }
        .pop-input { background: #2c2c2e; border: 1px solid #444; padding: 10px; border-radius: 10px; color: white; font-size: 14px; }
        .pop-cam-btn { background: #3a3a3c; color: white; border: none; padding: 10px; border-radius: 8px; font-size: 12px; cursor: pointer; }
        .pop-ok-btn { background: var(--accent); color: white; border: none; padding: 12px; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 14px; text-transform: uppercase; }
        .map-img { width: 100%; border-radius: 10px; margin-top: 8px; border: 1px solid #333; cursor: pointer; }
        
        /* Оверлей фото */
        .full-img-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 3000; display: none; justify-content: center; align-items: center; -webkit-backdrop-filter: blur(10px); backdrop-filter: blur(10px); }
        .full-img-overlay img { max-width: 95%; max-height: 95%; border-radius: 12px; }
    </style>
</head>
<body>

    <div id="map"></div>

    <div class="top-info">● БРАТСК LIVE: <span id="count">1</span></div>

    <div class="nav-bar">
        <button class="btn" onclick="openChat()">💬 ЧАТ</button>
        <button class="btn" onclick="findMe()">📍 ГДЕ Я?</button>
        <button class="btn btn-main" onclick="addHere()">🚔 МЕТКА</button>
    </div>

    <div id="chat-ui">
        <div class="chat-head">
            <h3 style="margin:0">Чат событий</h3>
            <button class="btn" style="padding: 10px 20px; flex: none;" onclick="closeChat()">ЗАКРЫТЬ</button>
        </div>
        <div id="chat-list" class="chat-list"></div>
        <div class="chat-input-row">
            <input type="text" id="chat-input" placeholder="Сообщение...">
            <button class="btn" style="padding: 10px; flex: none; background: var(--accent);" onclick="sendMsg()">></button>
        </div>
    </div>

    <div id="img-overlay" class="full-img-overlay" onclick="this.style.display='none'">
        <img id="full-img" src="">
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Данные Supabase
            const S_URL = 'https://ucyhfxapegpoubixlayp.supabase.co'; 
            const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVjeWhmeGFwZWdwb3ViaXhsYXlwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwMDMxMjAsImV4cCI6MjA4OTU3OTEyMH0.HkJ5Y0SPBjiCcg8eErtCWhHYIwlA4HV9TrfTRxpHIh0'; 
            
            let supabase;
            try {
                supabase = window.supabase.createClient(S_URL, S_KEY);
            } catch(e) { console.error("Base connection failed"); return; }

            const myId = localStorage.getItem('bratsk_id') || 'u' + Date.now();
            localStorage.setItem('bratsk_id', myId);

            // Инициализация карты
            const map = L.map('map', { zoomControl: false, attributionControl: false }).setView([56.13, 101.60], 12);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

            const markersLayer = L.layerGroup().addTo(map);
            const dpsIcon = L.divIcon({ html: '🚔', className: '', iconSize: [32, 32], iconAnchor: [16, 16] });
            const myIcon = L.divIcon({ html: '🚙', className: '', iconSize: [38, 38], iconAnchor: [19, 19] });
            
            let userMarker, userCoords;

            // Функции интерфейса
            window.openChat = () => document.getElementById('chat-ui').classList.add('active');
            window.closeChat = () => document.getElementById('chat-ui').classList.remove('active');

            function addRow(txt, user = 'Водитель') {
                const list = document.getElementById('chat-list');
                const row = document.createElement('div');
                row.style.marginBottom = "10px";
                row.innerHTML = `<b style="color:#007aff">${user}:</b> ${txt}`;
                list.appendChild(row);
                list.scrollTop = list.scrollHeight;
            }

            window.sendMsg = async () => {
                const inp = document.getElementById('chat-input');
                const val = inp.value.trim();
                if (!val) return;
                
                if (val === 'Cleanchat') await supabase.from('messages').delete().neq('id', 0);
                else if (val === 'Cleanmarker') await supabase.from('markers').delete().neq('id', 0);
                else await supabase.from('messages').insert([{ text: val }]);
                
                inp.value = '';
            };

            // Метки
            function drawMarker(m) {
                let h = `<div class="pop-box"><b style="font-size:16px; color:white">${m.content}</b>`;
                if (m.image_url) h += `<img src="${m.image_url}" class="map-img" onclick="showFullImg('${m.image_url}')">`;
                if (m.user_id === myId) h += `<button onclick="delMark(${m.id})" style="background:none; border:none; color:#ff453a; font-size:11px; margin-top:5px; cursor:pointer">Удалить мою метку</button>`;
                h += `</div>`;
                
                // Leaflet Pro Fix: Принудительная конвертация координат в числа
                const lat = parseFloat(m.lat);
                const lng = parseFloat(m.lng);
                L.marker([lat, lng], {icon: dpsIcon}).addTo(markersLayer).bindPopup(h);
            }

            window.showFullImg = (url) => {
                document.getElementById('full-img').src = url;
                document.getElementById('img-overlay').style.display = 'flex';
            };

            // Единая форма добавления
            function showForm(ll) {
                const div = document.createElement('div');
                div.className = 'pop-box';
                div.innerHTML = `
                    <input type="text" id="f-txt" class="pop-input" placeholder="Что тут происходт?">
                    <img id="f-pre" style="display:none; width:100%; border-radius:10px; margin-top:5px; border:1px solid #333; max-height:150px; object-fit:cover">
                    <button id="f-cam" class="pop-cam-btn">📷 ДОБАВИТЬ ФОТО</button>
                    <button id="f-ok" class="pop-ok-btn">ОПУБЛИКОВАТЬ</button>
                `;

                let currentImg = null;

                // Кнопка фото
                div.querySelector('#f-cam').onclick = () => {
                    const i = document.createElement('input'); i.type = 'file'; i.accept = 'image/*';
                    i.onchange = async () => {
                        if (i.files[0]) {
                            const name = Date.now() + '.jpg';
                            div.querySelector('#f-cam').innerText = "ЗАГРУЗКА...";
                            const { data, error } = await supabase.storage.from('images').upload(name, i.files[0]);
                            if (data) {
                                currentImg = `${S_URL}/storage/v1/object/public/images/${name}`;
                                div.querySelector('#f-pre').src = currentImg;
                                div.querySelector('#f-pre').style.display = 'block';
                                div.querySelector('#f-cam').style.display = 'none';
                            } else {
                                alert("Ошибка фото: " + error.message);
                                div.querySelector('#f-cam').innerText = "📷 ДОБАВИТЬ ФОТО";
                            }
                        }
                    };
                    i.click();
                };

                // Кнопка Опубликовать
                div.querySelector('#f-ok').onclick = async () => {
                    const val = div.querySelector('#f-txt').value;
                    if (!val) return alert("Введите описание!");
                    
                    div.querySelector('#f-ok').innerText = "СОХРАНЕНИЕ...";

                    // UX PRO FIX: Рисуем метку на карте МГНОВЕННО, не дожидаясь базы
                    const localMarkerData = {
                        lat: ll.lat, lng: ll.lng, content: val, image_url: currentImg, user_id: myId, id: Date.now()
                    };
                    drawMarker(localMarkerData);
                    map.closePopup();

                    // Сохраняем в базу в фоновом режиме
                    const { error } = await supabaseClient.from('markers').insert([{
                        lat: ll.lat, lng: ll.lng, content: val, image_url: currentImg, user_id: myId
                    }]);
                    
                    if (!error) {
                        await supabaseClient.from('messages').insert([{ text: "🚔 Метка: " + val, username: 'ДПС Бот' }]);
                    } else {
                        console.error("Ошибка базы:", error.message);
                        // Опционально: можно удалить локальную метку, если база вернула ошибку
                    }
                };
                L.popup().setLatLng(ll).setContent(div).openOn(map);
            }

            // Управление
            window.addHere = () => { if (userCoords) showForm(userCoords); else alert("Сначала нажми 'ГДЕ Я?'"); };
            map.on('click', e => showForm(e.latlng));
            window.findMe = () => map.locate({setView: true, maxZoom: 15, enableHighAccuracy: true});
            map.on('locationfound', e => {
                userCoords = e.latlng;
                if (userMarker) userMarker.setLatLng(e.latlng);
                else userMarker = L.marker(e.latlng, {icon: myIcon}).addTo(map);
            });
            window.delMark = async (id) => { await supabaseClient.from('markers').delete().eq('id', id); };

            // REALTIME СЛУШАТЕЛИ (ОБНОВЛЕННЫЕ)
            if (supabase) {
                supabase.channel('global').on('postgres_changes', { event: '*', schema: 'public', table: 'markers' }, (payload) => {
                    // Обрабатываем новые метки
                    if (payload.eventType === 'INSERT') {
                        // Leaflet Pro UX Fix: Рисуем метку только если это НЕ НАША метка
                        // (потому что свою мы нарисовали мгновенно в showForm)
                        if (payload.new.user_id !== myId) {
                            drawMarker(payload.new);
                        }
                    }
                    // Обрабатываем удаления
                    if (payload.eventType === 'DELETE') {
                        markersLayer.clearLayers();
                        load(); // Перезагружаем все метки, чтобы убрать удаленную
                    }
                }).on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, (payload) => {
                    appendRow(payload.new.text, payload.new.username);
                }).on('postgres_changes', { event: 'DELETE', schema: 'public', table: 'messages' }, () => {
                    document.getElementById('chat-messages').innerHTML = '<i>Чат очищен.</i>';
                }).subscribe();

                // Онлайн Presence
                const pres = supabase.channel('online');
                pres.on('presence', { event: 'sync' }, () => {
                    document.getElementById('count').innerText = Object.keys(pres.presenceState()).length;
                }).subscribe(async (s) => { if (s === 'SUBSCRIBED') await pres.track({ online: true }); });

                // Первоначальная загрузка
                async function load() {
                    const { data: mrks } = await supabase.from('markers').select('*');
                    if (mrks) mrks.forEach(drawMarker);
                    const { data: msgs } = await supabase.from('messages').select('*').order('created_at', {ascending: false}).limit(15);
                    if (msgs) msgs.reverse().forEach(m => appendRow(m.text, m.username));
                }
                load();
            }
        });
    </script>
</body>
</html>
