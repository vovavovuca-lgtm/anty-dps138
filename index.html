<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Братск Локатор Pro v16</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background: #000; font-family: -apple-system, sans-serif; overflow: hidden; position: fixed; width: 100%; }
        #map { height: 100vh; width: 100vw; background: #1a1a1a; z-index: 1; } 

        /* Интерфейс */
        #online-tracker { position: absolute; top: 15px; left: 15px; z-index: 1001; background: rgba(0,0,0,0.85); color: #00ff00; padding: 6px 15px; border-radius: 20px; font-size: 11px; font-weight: bold; border: 1px solid rgba(0,255,0,0.5); pointer-events: none; }
        
        #chat-window { position: absolute; top: 15px; right: 15px; width: 260px; z-index: 1001; background: rgba(20,20,20,0.95); border-radius: 12px; display: flex; flex-direction: column; box-shadow: 0 8px 32px rgba(0,0,0,0.5); border: 1px solid #333; transition: 0.3s; }
        #chat-header { padding: 12px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; color: white; font-weight: bold; font-size: 13px; }
        #chat-body { height: 250px; display: flex; flex-direction: column; }
        #chat-messages { flex: 1; overflow-y: auto; padding: 10px; color: #eee; font-size: 13px; border-top: 1px solid #333; background: rgba(0,0,0,0.2); }
        #chat-input { background: #1a1a1a; border: none; padding: 15px; color: white; border-radius: 0 0 12px 12px; outline: none; border-top: 1px solid #333; font-size: 14px; }
        
        .minimized { width: 150px !important; }
        .minimized #chat-body { display: none; }

        .controls { position: absolute; bottom: 30px; left: 15px; right: 15px; z-index: 1001; display: flex; gap: 10px; }
        .btn { flex: 1; border: none; padding: 18px; border-radius: 15px; font-weight: bold; color: white; cursor: pointer; font-size: 13px; text-transform: uppercase; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .btn-blue { background: #0077ff; }
        .btn-green { background: #28a745; }

        .popup-img { width: 100%; border-radius: 8px; margin-top: 8px; cursor: pointer; border: 1px solid #444; }
        .leaflet-popup-content-wrapper { background: #222 !important; color: white !important; border-radius: 12px !important; }
        .leaflet-popup-tip { background: #222 !important; }
    </style>
</head>
<body>

    <div id="online-tracker">ОНЛАЙН: <span id="online-count">1</span></div>

    <div id="chat-window">
        <div id="chat-header" onclick="toggleChat()">
            <span>💬 ЧАТ СОБЫТИЙ</span>
            <span id="toggle-icon">—</span>
        </div>
        <div id="chat-body">
            <div id="chat-messages"></div>
            <input type="text" id="chat-input" placeholder="Написать в эфир...">
        </div>
    </div>

    <div id="map"></div>

    <div class="controls">
        <button class="btn btn-blue" onclick="getLocation()">📍 ГДЕ Я?</button>
        <button class="btn btn-green" onclick="addCustomMarker()">🚔 МЕТКА ТУТ</button>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <script>
        const URL = 'https://ucyhfxapegpoubixlayp.supabase.co'; 
        const KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVjeWhmeGFwZWdwb3ViaXhsYXlwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwMDMxMjAsImV4cCI6MjA4OTU3OTEyMH0.HkJ5Y0SPBjiCcg8eErtCWhHYIwlA4HV9TrfTRxpHIh0'; 
        const supabase = window.supabase.createClient(URL, KEY);

        if (!localStorage.getItem('my_uid')) localStorage.setItem('my_uid', 'u' + Date.now());
        const myUid = localStorage.getItem('my_uid');

        // Инициализация карты
        var map = L.map('map', { zoomControl: false, attributionControl: false }).setView([56.13, 101.60], 12);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        // Фикс серого экрана (принудительное обновление размера)
        setTimeout(() => { map.invalidateSize(); }, 500);

        const dpsIcon = L.divIcon({ html: '🚔', className: '', iconSize: [30, 30], iconAnchor: [15, 15] });
        const myCarIcon = L.divIcon({ html: '🚙', className: '', iconSize: [36, 36], iconAnchor: [18, 18] });

        var userMarker, userCoords = null;
        var markersLayer = L.layerGroup().addTo(map);

        function toggleChat() {
            const win = document.getElementById('chat-window');
            win.classList.toggle('minimized');
            document.getElementById('toggle-icon').innerText = win.classList.contains('minimized') ? '+' : '—';
        }

        async function loadData() {
            // Очищаем перед загрузкой, чтобы не дублировать
            markersLayer.clearLayers();
            document.getElementById('chat-messages').innerHTML = '';

            const { data: msgs } = await supabase.from('messages').select('*').order('created_at', { ascending: false }).limit(20);
            if (msgs) msgs.reverse().forEach(m => appendMsg(m.text));

            const { data: mrks } = await supabase.from('markers').select('*');
            if (mrks) mrks.forEach(renderMarker);
        }

        function appendMsg(txt) {
            const box = document.getElementById('chat-messages');
            const div = document.createElement('div');
            div.style.marginBottom = '8px';
            div.innerHTML = `<b style="color:#0077ff">Водитель:</b> ${txt}`;
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;
        }

        function renderMarker(m) {
            let h = `<div style="color:white; min-width:150px;"><b>${m.content}</b>`;
            if (m.image_url) h += `<img src="${m.image_url}" class="popup-img" onclick="window.open('${m.image_url}')">`;
            if (m.user_id === myUid) h += `<br><button onclick="deleteMarker(${m.id})" style="width:100%; margin-top:8px; background:#ff3b30; color:white; border:none; padding:8px; border-radius:8px; font-weight:bold; cursor:pointer;">УДАЛИТЬ</button>`;
            h += `</div>`;
            L.marker([m.lat, m.lng], {icon: dpsIcon}).addTo(markersLayer).bindPopup(h);
        }

        document.getElementById('chat-input').onkeypress = async (e) => {
            if (e.key === 'Enter' && e.target.value) {
                const val = e.target.value;
                if (val === 'Cleanchat') {
                    await supabase.from('messages').delete().neq('id', 0);
                } else if (val === 'Cleanmarker') {
                    await supabase.from('markers').delete().neq('id', 0);
                } else {
                    await supabase.from('messages').insert([{ text: val }]);
                }
                e.target.value = '';
            }
        };

        // REALTIME
        supabase.channel('db-changes').on('postgres_changes', { event: '*', schema: 'public', table: 'messages' }, (p) => {
            if (p.eventType === 'INSERT') appendMsg(p.new.text);
            if (p.eventType === 'DELETE') document.getElementById('chat-messages').innerHTML = '';
        }).on('postgres_changes', { event: '*', schema: 'public', table: 'markers' }, (p) => {
            loadData(); // Перегружаем при любых изменениях меток для точности
        }).subscribe();

        // ОНЛАЙН
        const pres = supabase.channel('online_users');
        pres.on('presence', { event: 'sync' }, () => {
            document.getElementById('online-count').innerText = Object.keys(pres.presenceState()).length;
        }).subscribe(async (s) => { if (s === 'SUBSCRIBED') await pres.track({ online: true }); });

        // GPS
        function getLocation() { map.locate({setView: true, maxZoom: 15}); }
        map.on('locationfound', e => {
            userCoords = e.latlng;
            if (userMarker) userMarker.setLatLng(e.latlng);
            else userMarker = L.marker(e.latlng, {icon: myCarIcon}).addTo(map);
        });

        async function addCustomMarker() {
            const latlng = userCoords || map.getCenter();
            const txt = prompt("Что видишь? (например: ДПС на мосту)");
            if (!txt) return;

            if (confirm("Добавить фото к метке?")) {
                const input = document.createElement('input');
                input.type = 'file'; input.accept = 'image/*';
                input.onchange = async () => {
                    const file = input.files[0];
                    if (file) {
                        const fname = Date.now() + '.jpg';
                        const { data } = await supabase.storage.from('images').upload(fname, file);
                        if (data) {
                            const imgUrl = `${URL}/storage/v1/object/public/images/${fname}`;
                            await saveToDb(latlng, txt, imgUrl);
                        }
                    }
                };
                input.click();
            } else {
                await saveToDb(latlng, txt, null);
            }
        }

        async function saveToDb(ll, t, img) {
            await supabase.from('markers').insert([{ lat: ll.lat, lng: ll.lng, content: t, image_url: img, user_id: myUid }]);
            await supabase.from('messages').insert([{ text: "🚔 Метка: " + t }]);
        }

        window.deleteMarker = async (id) => {
            await supabase.from('markers').delete().eq('id', id);
        };

        loadData();
    </script>
</body>
</html>
