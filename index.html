<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Карта Меток</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background: #000; }
        #map { height: 100vh; width: 100vw; }
        
        /* Красивая кнопка */
        .add-btn {
            position: absolute; bottom: 40px; left: 50%;
            transform: translateX(-50%); z-index: 1000;
            background: #0088cc; color: white; padding: 15px 25px;
            border-radius: 50px; border: none; font-size: 16px;
            font-weight: bold; box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        
        /* Скрываем стандартную панель с флагом и ссылками */
        .leaflet-control-attribution { display: none !important; }
    </style>
</head>
<body>

    <div id="map"></div>
    <button class="add-btn" onclick="getLocation()">📍 Найти меня</button>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // Инициализируем карту
        var map = L.map('map', { zoomControl: false }).setView([55.75, 37.61], 13);

        // Ставим СПУТНИКОВЫЕ карты (World Imagery)
        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
            maxZoom: 19
        }).addTo(map);

        // Функция поиска (заработает после выгрузки в интернет)
        function getLocation() {
            map.locate({setView: true, maxZoom: 17});
        }

        map.on('locationfound', function(e) {
            L.marker(e.latlng).addTo(map).bindPopup("Я тут").openPopup();
        });

        map.on('locationerror', function() {
            alert("Для работы GPS нужен HTTPS или разрешение в браузере.");
        });

        // Ставим метку по клику
        map.on('click', function(e) {
            var text = prompt("Что тут?");
            if (text) {
                L.marker(e.latlng).addTo(map).bindPopup(text).openPopup();
            }
        });
    </script>
</body>
</html>
