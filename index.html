<!DOCTYPE html>
<html lang="ru" style="margin:0;padding:0;height:100%;width:100%;">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>BRATSK MONITOR v14</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: #000; overflow: hidden; position: fixed;
            font-family: -apple-system, system-ui, sans-serif;
        }

        /* Карта на весь экран без зазоров */
        #map { 
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            width: 100vw; height: 100vh; background: #111; z-index: 1;
        }

        /* Интерфейс поверх карты */
        .ui { position: absolute; z-index: 1000; pointer-events: none; width: 100%; }
        .ui-bottom { bottom: 30px; padding: 0 15px; display: flex; gap: 10px; }
        .ui-top { top: 15px; left: 15px; }

        .widget { 
            background: rgba(25, 25, 25, 0.9); border: 1px solid rgba(255,255,255,0.1); 
            border-radius: 15px; color: white; pointer-events: auto;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
        }

        .btn { 
            flex: 1; border: none; padding: 18px 5px; font-weight: 800; font-size: 11px;
            text-transform: uppercase; cursor: pointer; color: white;
        }
        .btn-blue { background: #007aff; border-radius: 15px; }

        /* Чат */
        #chat { 
            position: fixed; top: 0; left: 100%; width: 100%; height: 100%; 
            background: #0f0f0f; z-index: 2000; transition: 0.3s ease-out;
            display: flex; flex-direction: column; 
        }
        #chat.active { left: 0; }
        .chat-h { padding: 20px; border-bottom: 1px solid #222; display: flex; justify-content: space-between; align-items: center; }
        #chat-m { flex: 1; overflow-y: auto; padding: 15px; font-size: 14px; }
        .chat-f { padding: 15px; display: flex; gap: 10px; background: #151515; padding-bottom: 40px; }
        input { flex: 1; background: #252525; border: 1px solid #333; padding: 12px; border-radius: 10px; color: white; outline: none; }

        /* Метки */
        .leaflet-popup-content-wrapper { background: #1a1a1a; color: white; border-radius: 12px; }
        .pop-card { display: flex; flex-direction: column; gap: 8px; min-width: 160px; padding: 5px; }
        .pop-img { width: 100%; border-radius: 8px; border: 1px solid #333; }
    </style>
</head>
<body>

    <div id="map"></div>

    <div class="ui ui-top">
        <div class="widget" style="padding: 7px 15px; font-size: 11px; color: #32d74b; font-weight: 900;">
            ● LIVE: <span id="count">1</span>
        </div>
    </div>

    <div class="ui ui-bottom">
        <button class="widget btn" onclick="showChat(true)">ЧАТ</button>
        <button class="widget btn" onclick="goGPS()">ГДЕ Я?</button>
        <button class="widget btn btn-blue" onclick="makeMark()">МЕТКА</button>
    </div>

    <div id="chat">
        <div class="chat-h">
            <b style="color:white; font-size:18px">СОБЫТИЯ</b>
            <button class="widget btn" style="flex:none; padding:10px 20px" onclick="showChat(false)">ЗАКРЫТЬ</button>
        </div>
        <div id="chat-m"></div>
        <div class="chat-f">
            <input type="text" id="chat-i" placeholder="Напиши что-нибудь...">
            <button class="btn-blue btn" style="flex:none; width:55px" onclick="doSend()">></button>
        </div>
    </div>

    <script>
        // 1. ПОДКЛЮЧЕНИЕ БАЗЫ
        const URL = 'https://ucyhfxapegpoubixlayp.supabase.co';
        const KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVjeWhmeGFwZWdwb3ViaXhsYXlwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwMDMxMjAsImV4cCI6MjA4OTU3OTEyMH0.HkJ5Y0SPBjiCcg8eErtCWhHYIwlA4HV9TrfTRxpHIh0';
        const db = window.supabase.createClient(URL, KEY);
        const myID = localStorage.getItem('u_id_v14') || 'user_' + Math.random().toString(36).substr(2, 5);
        localStorage.setItem('u_id_v14', myID);

        let map, markers, myPos = null, meMark = null;

        // 2. ЗАПУСК КАРТЫ (С ФИКСОМ СЕРОГО ЭКРАНА)
        function start() {
            map = L.map('map', { zoomControl: false, attributionControl: false }).setView([56.13, 101.60], 12);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
            markers = L.layerGroup().addTo(map);

            // Тот самый "пинок" для карты
            const fixer = setInterval(() => {
                map.invalidateSize();
                if (document.querySelector('.leaflet-tile-loaded')) clearInterval(fixer);
            }, 400);

            map.on('click', e => openForm(e.latlng));
            sync();
            realtime();
        }

        // 3. ФУНКЦИИ
        function showChat(s) { document.getElementById('chat').classList.toggle('active', s); }

        async function doSend() {
            const i = document.getElementById('chat-i');
            if (!i.value.trim()) return;
            await db.from('messages').insert([{ text: i.value.trim() }]);
            i.value = '';
        }

        function draw(m) {
            let h = `<div class="pop-card"><b>${m.content}</b>`;
            if (m.image_url) h += `<img src="${m.image_url}" class="pop-img" onclick="window.open('${m.image_url}')">`;
            if (m.user_id === myID) h += `<button onclick="kill(${m.id})" style="border:none;background:none;color:red;font-size:10px;cursor:pointer">Удалить</button>`;
            h += `</div>`;
            L.marker([m.lat, m.lng], { icon: L.divIcon({html:'🚔', className:'', iconSize:[30,30]}) }).addTo(markers).bindPopup(h);
        }

        function openForm(ll) {
            const d = document.createElement('div');
            d.className = 'pop-card';
            d.innerHTML = `
                <input id="f-t" placeholder="Что видим?" style="padding:10px; border-radius:8px; border:1px solid #444; background:#222; color:white">
                <button id="f-c" class="widget btn" style="padding:10px; font-size:10px">ФОТО</button>
                <button id="f-s" class="btn btn-blue" style="padding:10px">ОК</button>
            `;

            let img = null;
            d.querySelector('#f-c').onclick = () => {
                const f = document.createElement('input'); f.type = 'file'; f.accept = 'image/*';
                f.onchange = async () => {
                    if (!f.files[0]) return;
                    d.querySelector('#f-c').innerText = '...';
                    const name = Date.now() + '.jpg';
                    const { data } = await db.storage.from('images').upload(name, f.files[0]);
                    if (data) {
                        img = `${URL}/storage/v1/object/public/images/${name}`;
                        d.querySelector('#f-c').innerText = 'ЕСТЬ';
                    }
                };
                f.click();
            };

            d.querySelector('#f-s').onclick = async () => {
                const t = d.querySelector('#f-t').value;
                if (!t) return;
                draw({ lat: ll.lat, lng: ll.lng, content: t, image_url: img, user_id: myID, id: Date.now() });
                map.closePopup();
                await db.from('markers').insert([{ lat: ll.lat, lng: ll.lng, content: t, image_url: img, user_id: myID }]);
            };
            L.popup().setLatLng(ll).setContent(d).openOn(map);
        }

        function goGPS() { map.locate({ setView: true, maxZoom: 15 }); }
        map.on('locationfound', e => {
            myPos = e.latlng;
            if (meMark) meMark.setLatLng(e.latlng);
            else meMark = L.marker(e.latlng, { icon: L.divIcon({html:'🚙', className:'', iconSize:[35,35]}) }).addTo(map);
        });

        function makeMark() { if (myPos) openForm(myPos); else alert('Жми ГДЕ Я?'); }

        window.kill = async (id) => {
            await db.from('markers').delete().eq('id', id);
            markers.clearLayers();
            sync();
        };

        // 4. ДАННЫЕ
        async function sync() {
            const { data: m } = await db.from('markers').select('*');
            if (m) m.forEach(draw);
            const { data: g } = await db.from('messages').select('*').order('created_at',{ascending:false}).limit(15);
            if (g) {
                const f = document.getElementById('chat-m');
                f.innerHTML = '';
                g.reverse().forEach(x => { f.innerHTML += `<div style="margin-bottom:10px; color:#fff"><b>Водитель:</b> ${x.text}</div>`; });
                f.scrollTop = f.scrollHeight;
            }
        }

        function realtime() {
            db.channel('v14').on('postgres_changes', { event: '*', schema: 'public', table: 'markers' }, p => {
                if (p.eventType === 'INSERT' && p.new.user_id !== myID) draw(p.new);
                if (p.eventType === 'DELETE') { markers.clearLayers(); sync(); }
            }).on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, p => {
                const f = document.getElementById('chat-m');
                f.innerHTML += `<div style="margin-bottom:10px; color:#fff"><b>Водитель:</b> ${p.new.text}</div>`;
                f.scrollTop = f.scrollHeight;
            }).subscribe();

            const p = db.channel('online');
            p.on('presence', { event: 'sync' }, () => {
                document.getElementById('count').innerText = Object.keys(p.presenceState()).length;
            }).subscribe(async s => { if (s === 'SUBSCRIBED') await p.track({ online: true }); });
        }

        window.onload = start;
    </script>
</body>
</html>
