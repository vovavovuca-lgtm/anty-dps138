<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Народная Карта</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background: #222; }
        #map { height: 100vh; width: 100vw; }
        .add-btn {
            position: absolute; bottom: 30px; left: 50%;
            transform: translateX(-50%); z-index: 1000;
            background: #0088cc; color: white; padding: 15px 25px;
            border-radius: 50px; border: none; font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="map"></div>
    <button class="add-btn" onclick="getLocation()">📍 Где я?</button>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <script>
        // ВСТАВЬ СЮДА СВОИ ДАННЫЕ
        const SUPABASE_URL = 'https://ucyhfxapegpoubixlayp.supabase.co';
        const SUPABASE_KEY = 'ВСТАВЬ_СЮДА_ТОТ_САМЫЙ_ДЛИННЫЙ_КЛЮЧ'; 

        try {
            const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

            var map = L.map('map', { zoomControl: false }).setView([55.75, 37.61], 13);
            
            // Используем обычную карту для проверки
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

            // Загрузка меток
            async function load() {
                const { data } = await supabaseClient.from('markers').select('*');
                if (data) {
                    data.forEach(m => L.marker([m.lat, m.lng]).addTo(map).bindPopup(m.content));
                }
            }
            load();

            // Клик для новой метки
            map.on('click', async function(e) {
                var text = prompt("Что тут?");
                if (text) {
                    L.marker(e.latlng).addTo(map).bindPopup(text).openPopup();
                    await supabaseClient.from('markers').insert([{ lat: e.latlng.lat, lng: e.latlng.lng, content: text }]);
                }
            });

            function getLocation() {
                map.locate({setView: true, maxZoom: 16});
            }
            window.getLocation = getLocation;

        } catch (err) {
            document.body.innerHTML = "<h2 style='color:white; padding:20px;'>Ошибка в коде: " + err.message + "</h2>";
        }
    </script>
</body>
</html>
