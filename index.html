<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Братск ЛОКАТОР(beta)</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --accent: #007aff; --bg: #121212; --glass: saturate(180%) blur(15px); }
        body, html { margin: 0; padding: 0; height: 100%; background: #000; font-family: -apple-system, sans-serif; overflow: hidden; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; background: #1a1a1a; z-index: 1; }

        /* Элементы управления */
        .ui-overlay { position: absolute; z-index: 1000; pointer-events: none; width: 100%; }
        .top-info { top: 15px; left: 15px; }
        .bottom-nav { bottom: 30px; left: 15px; right: 15px; display: flex; gap: 10px; }
        
        .glass-panel { 
            background: rgba(30, 30, 30, 0.7); -webkit-backdrop-filter: var(--glass); backdrop-filter: var(--glass);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; color: white; pointer-events: auto;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
        }

        .status { padding: 8px 16px; color: #32d74b; font-size: 12px; font-weight: bold; }
        .btn { flex: 1; border: none; padding: 18px 5px; color: white; font-weight: bold; font-size: 12px; text-transform: uppercase; cursor: pointer; }
        .btn-main { background: var(--accent); }

        /* Чат */
        #chat-ui {
            position: fixed; top: 0; right: -100%; width: 100%; height: 100%;
            background: var(--bg); z-index: 2000; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex; flex-direction: column;
        }
        #chat-ui.active { right: 0; }
        .chat-head { padding: 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; }
        #chat-list { flex: 1; overflow-y: auto; padding: 15px; color: #eee; font-size: 14px; }
        .chat-input-row { padding: 15px; background: #1a1a1a; display: flex; gap: 10px; padding-bottom: 35px; }
        #chat-input { flex: 1; background: #333; border: none; padding: 12px; border-radius: 12px; color: white; outline: none; }

        /* Попапы */
        .leaflet-popup-content-wrapper { background: #1c1c1e; color: white; border-radius: 18px; }
        .pop-box { min-width: 180px; display: flex; flex-direction: column; gap: 10px; padding: 5px; }
        .pop-input { background: #2c2c2e; border: 1px solid #444; padding: 10px; border-radius: 10px; color: white; }
        .pop-img { width: 100%; border-radius: 12px; border: 1px solid #333; }
    </style>
</head>
<body>

    <div id="map"></div>

    <div class="ui-overlay top-info">
        <div class="glass-panel status">● LIVE: <span id="online-count">1</span></div>
    </div>

    <div class="ui-overlay bottom-nav">
        <button class="glass-panel btn" onclick="toggleChat(true)">💬 ЧАТ</button>
        <button class="glass-panel btn" onclick="findMe()">📍 ГДЕ Я?</button>
        <button class="glass-panel btn btn-main" onclick="addCurrent()">🚔 МЕТКА</button>
    </div>

    <div id="chat-ui">
        <div class="chat-head">
            <h3 style="margin:0; color:white">События</h3>
            <button class="glass-panel btn" style="flex:none; padding:10px 20px" onclick="toggleChat(false)">ЗАКРЫТЬ</button>
        </div>
        <div id="chat-list"></div>
        <div class="chat-input-row">
            <input type="text" id="chat-input" placeholder="Напишите сообщение...">
            <button class="btn-main btn" style="flex:none; width:60px; border-radius:12px" onclick="sendChatMessage()">></button>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <script>
        // КОНФИГУРАЦИЯ
        const S_URL = 'https://ucyhfxapegpoubixlayp.supabase.co'; 
        const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVjeWhmeGFwZWdwb3ViaXhsYXlwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwMDMxMjAsImV4cCI6MjA4OTU3OTEyMH0.HkJ5Y0SPBjiCcg8eErtCWhHYIwlA4HV9TrfTRxpHIh0'; 
        const supabase = window.supabase.createClient(S_URL, S_KEY);

        const myId = localStorage.getItem('user_id_v9') || 'u' + Math.random().toString(36).substr(2, 9);
        localStorage.setItem('user_id_v9', myId);

        // ИНИЦИАЛИЗАЦИЯ КАРТЫ
        const map = L.map('map', { zoomControl: false, attributionControl: false }).setView([56.13, 101.60], 12);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        const markersGroup = L.layerGroup().addTo(map);

        const icons = {
            dps: L.divIcon({ html: '🚔', className: '', iconSize: [32, 32], iconAnchor: [16, 16] }),
            me: L.divIcon({ html: '🚙', className: '', iconSize: [38, 38], iconAnchor: [19, 19] })
        };

        let userCoords = null;
        let userMarker = null;

        // ЛОГИКА ИНТЕРФЕЙСА
        function toggleChat(show) { document.getElementById('chat-ui').classList.toggle('active', show); }

        function appendChat(text) {
            const list = document.getElementById('chat-list');
            const item = document.createElement('div');
            item.style.marginBottom = "8px";
            item.innerHTML = `<b style="color:var(--accent)">Водитель:</b> ${text}`;
            list.appendChild(item);
            list.scrollTop = list.scrollHeight;
        }

        async function sendChatMessage() {
            const inp = document.getElementById('chat-input');
            const val = inp.value.trim();
            if (!val) return;
            if (val === 'Clear') return await supabase.from('markers').delete().neq('id', 0);
            await supabase.from('messages').insert([{ text: val }]);
            inp.value = '';
        }

        // РАБОТА С МЕТКАМИ
        function renderMarker(m) {
            let content = `<div class="pop-box"><b>${m.content}</b>`;
            if (m.image_url) content += `<img src="${m.image_url}" class="pop-img" onclick="window.open('${m.image_url}')">`;
            if (m.user_id === myId) content += `<button onclick="deleteMyMarker(${m.id})" style="color:#ff453a; border:none; background:none; cursor:pointer; font-size:11px">Удалить</button>`;
            content += `</div>`;
            L.marker([m.lat, m.lng], { icon: icons.dps }).addTo(markersGroup).bindPopup(content);
        }

        function openAddForm(latlng) {
            const container = document.createElement('div');
            container.className = 'pop-box';
            container.innerHTML = `
                <input type="text" id="pop-text" class="pop-input" placeholder="Что видим?">
                <button id="pop-cam" class="btn glass-panel" style="padding:10px; font-size:10px">📷 ДОБАВИТЬ ФОТО</button>
                <button id="pop-save" class="btn btn-main" style="padding:10px; border-radius:10px">ОПУБЛИКОВАТЬ</button>
            `;

            let imgUrl = null;

            container.querySelector('#pop-cam').onclick = () => {
                const fileInput = document.createElement('input');
                fileInput.type = 'file'; fileInput.accept = 'image/*';
                fileInput.onchange = async () => {
                    const file = fileInput.files[0];
                    if (!file) return;
                    container.querySelector('#pop-cam').innerText = 'ЗАГРУЗКА...';
                    const fileName = `${Date.now()}_${Math.random().toString(36).substr(2, 5)}.jpg`;
                    const { data, error } = await supabase.storage.from('images').upload(fileName, file);
                    if (data) {
                        imgUrl = `${S_URL}/storage/v1/object/public/images/${fileName}`;
                        container.querySelector('#pop-cam').innerText = '✅ ФОТО ГОТОВО';
                        container.querySelector('#pop-cam').style.color = '#32d74b';
                    } else {
                        alert('Ошибка загрузки: ' + error.message);
                        container.querySelector('#pop-cam').innerText = '📷 ОШИБКА';
                    }
                };
                fileInput.click();
            };

            container.querySelector('#pop-save').onclick = async () => {
                const text = container.querySelector('#pop-text').value;
                if (!text) return alert('Введите описание');
                
                // Мгновенный локальный показ
                renderMarker({ lat: latlng.lat, lng: latlng.lng, content: text, image_url: imgUrl, user_id: myId, id: Date.now() });
                map.closePopup();

                // Сохранение
                await supabase.from('markers').insert([{ lat: latlng.lat, lng: latlng.lng, content: text, image_url: imgUrl, user_id: myId }]);
                await supabase.from('messages').insert([{ text: "🚨 Метка: " + text }]);
            };

            L.popup().setLatLng(latlng).setContent(container).openOn(map);
        }

        // GPS
        function findMe() { map.locate({ setView: true, maxZoom: 15 }); }
        map.on('locationfound', e => {
            userCoords = e.latlng;
            if (userMarker) userMarker.setLatLng(e.latlng);
            else userMarker = L.marker(e.latlng, { icon: icons.me }).addTo(map);
        });
        function addCurrent() { if (userCoords) openAddForm(userCoords); else alert('Нажми "ГДЕ Я?"'); }
        map.on('click', e => openAddForm(e.latlng));

        window.deleteMyMarker = async (id) => {
            await supabase.from('markers').delete().eq('id', id);
            markersGroup.clearLayers();
            loadData();
        };

        // REALTIME И ЗАГРУЗКА
        async function loadData() {
            const { data: marks } = await supabase.from('markers').select('*');
            if (marks) marks.forEach(renderMarker);
            const { data: msgs } = await supabase.from('messages').select('*').order('created_at', { ascending: false }).limit(10);
            if (msgs) msgs.reverse().forEach(m => appendChat(m.text));
        }

        supabase.channel('room_v9').on('postgres_changes', { event: '*', schema: 'public', table: 'markers' }, (payload) => {
            if (payload.eventType === 'INSERT' && payload.new.user_id !== myId) renderMarker(payload.new);
            if (payload.eventType === 'DELETE') { markersGroup.clearLayers(); loadData(); }
        }).on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, (payload) => {
            appendChat(payload.new.text);
        }).subscribe();

        // Онлайн
        const pres = supabase.channel('online_v9');
        pres.on('presence', { event: 'sync' }, () => {
            document.getElementById('online-count').innerText = Object.keys(pres.presenceState()).length;
        }).subscribe(async (s) => { if (s === 'SUBSCRIBED') await pres.track({ online: true }); });

        loadData();
    </script>
</body>
</html>
